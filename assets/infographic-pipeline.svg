<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06b6d4" opacity="0.7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e" opacity="0.7"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316" opacity="0.7"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="675" stroke="white" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="675" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="675" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="675" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="675" stroke="white" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="675" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="675" stroke="white" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="675" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="675" stroke="white" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="675" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="675" stroke="white" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="675" stroke="white" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="675" stroke="white" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" font-family="Segoe UI, system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="0.5">Self-Maintaining Dataset Catalog</text>
  <line x1="420" y1="75" x2="780" y2="75" stroke="#30363d" stroke-width="1"/>

  <!-- ==================== MAIN PIPELINE ROW ==================== -->
  <!-- Y center for pipeline boxes: 220 -->

  <!-- Node 1: Papers with Code (cyan) -->
  <g filter="url(#glow)">
    <rect x="60" y="170" width="200" height="100" rx="12" fill="#0d1117" stroke="#06b6d4" stroke-width="2"/>
  </g>
  <rect x="60" y="170" width="200" height="100" rx="12" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d4" stroke-width="2"/>
  <!-- Refresh icon -->
  <g transform="translate(160, 200)">
    <path d="M-8,-6 A10,10 0 1,1 -8,6" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
    <polygon points="-11,5 -8,9 -5,5" fill="#06b6d4"/>
    <path d="M8,6 A10,10 0 1,1 8,-6" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
    <polygon points="11,-5 8,-9 5,-5" fill="#06b6d4"/>
  </g>
  <text x="160" y="250" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="600" fill="#06b6d4">Papers with Code</text>

  <!-- Arrow 1 with "weekly" label -->
  <line x1="270" y1="220" x2="365" y2="220" stroke="#06b6d4" stroke-width="2" opacity="0.7" marker-end="url(#arrowCyan)"/>
  <rect x="290" y="196" width="60" height="18" rx="9" fill="#06b6d4" fill-opacity="0.15"/>
  <text x="320" y="209" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#06b6d4" opacity="0.9">weekly</text>

  <!-- Node 2: SOTA Snapshot (green) -->
  <g filter="url(#glow)">
    <rect x="380" y="170" width="200" height="100" rx="12" fill="#0d1117" stroke="#22c55e" stroke-width="2"/>
  </g>
  <rect x="380" y="170" width="200" height="100" rx="12" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-width="2"/>
  <!-- Database icon -->
  <g transform="translate(480, 200)">
    <ellipse cx="0" cy="-6" rx="10" ry="4" fill="none" stroke="#22c55e" stroke-width="2"/>
    <line x1="-10" y1="-6" x2="-10" y2="6" stroke="#22c55e" stroke-width="2"/>
    <line x1="10" y1="-6" x2="10" y2="6" stroke="#22c55e" stroke-width="2"/>
    <ellipse cx="0" cy="6" rx="10" ry="4" fill="none" stroke="#22c55e" stroke-width="2"/>
    <path d="M-10,0 A10,4 0 0,0 10,0" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  </g>
  <text x="480" y="250" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="600" fill="#22c55e">SOTA Snapshot</text>

  <!-- Arrow 2 -->
  <line x1="590" y1="220" x2="685" y2="220" stroke="#22c55e" stroke-width="2" opacity="0.7" marker-end="url(#arrowGreen)"/>

  <!-- Node 3: 53 Dataset Cards (orange) -->
  <g filter="url(#glow)">
    <rect x="700" y="170" width="200" height="100" rx="12" fill="#0d1117" stroke="#f97316" stroke-width="2"/>
  </g>
  <rect x="700" y="170" width="200" height="100" rx="12" fill="#f97316" fill-opacity="0.1" stroke="#f97316" stroke-width="2"/>
  <!-- Document icon -->
  <g transform="translate(800, 200)">
    <rect x="-8" y="-10" width="16" height="20" rx="2" fill="none" stroke="#f97316" stroke-width="2"/>
    <line x1="-4" y1="-4" x2="4" y2="-4" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>
    <line x1="-4" y1="4" x2="2" y2="4" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>
  </g>
  <text x="800" y="250" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="600" fill="#f97316">53 Dataset Cards</text>

  <!-- Arrow 3 -->
  <line x1="910" y1="220" x2="1005" y2="220" stroke="#f97316" stroke-width="2" opacity="0.7" marker-end="url(#arrowOrange)"/>

  <!-- Node 4: GitHub Pages (purple) -->
  <g filter="url(#glow)">
    <rect x="1020" y="170" width="120" height="100" rx="12" fill="#0d1117" stroke="#a78bfa" stroke-width="2"/>
  </g>
  <rect x="1020" y="170" width="120" height="100" rx="12" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-width="2"/>
  <!-- Globe icon -->
  <g transform="translate(1080, 200)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="5" ry="10" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#a78bfa" stroke-width="1.5"/>
    <path d="M-9,-4 Q0,-5 9,-4" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
    <path d="M-9,4 Q0,5 9,4" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  </g>
  <text x="1080" y="250" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="600" fill="#a78bfa">GitHub Pages</text>

  <!-- ==================== PIPELINE FLOW LABEL ==================== -->
  <text x="600" y="320" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="3" text-transform="uppercase">AUTOMATED UPDATE PIPELINE</text>

  <!-- ==================== SEPARATOR ==================== -->
  <line x1="100" y1="355" x2="1100" y2="355" stroke="#30363d" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ==================== SECOND ROW: LINK CHECKER ==================== -->
  <!-- Y center: 440 -->

  <!-- Label -->
  <text x="600" y="395" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#8b949e" letter-spacing="3" text-transform="uppercase">HEALTH CHECK PIPELINE</text>

  <!-- Node: Link Checker (red) -->
  <g filter="url(#glow)">
    <rect x="240" y="420" width="200" height="90" rx="12" fill="#0d1117" stroke="#ef4444" stroke-width="2"/>
  </g>
  <rect x="240" y="420" width="200" height="90" rx="12" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="2"/>
  <!-- Check/shield icon -->
  <g transform="translate(340, 448)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#ef4444" stroke-width="2"/>
    <polyline points="-5,0 -1,4 6,-4" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="340" y="492" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="600" fill="#ef4444">Link Checker</text>

  <!-- Arrow with "weekly" label -->
  <line x1="450" y1="465" x2="580" y2="465" stroke="#ef4444" stroke-width="2" opacity="0.7" marker-end="url(#arrowRed)"/>
  <rect x="487" y="441" width="60" height="18" rx="9" fill="#ef4444" fill-opacity="0.15"/>
  <text x="517" y="454" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#ef4444" opacity="0.9">weekly</text>

  <!-- Result node: Dead links auto-removed -->
  <g filter="url(#glow)">
    <rect x="595" y="420" width="280" height="90" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  </g>
  <rect x="595" y="420" width="280" height="90" rx="12" fill="#21262d" fill-opacity="0.5" stroke="#30363d" stroke-width="2"/>
  <!-- Trash/remove icon -->
  <g transform="translate(735, 448)">
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="735" y="492" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="600" fill="#c9d1d9">Dead links auto-removed</text>

  <!-- ==================== BOTTOM TEXT ==================== -->
  <text x="600" y="595" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="20" fill="white" opacity="0.9">Zero manual maintenance after setup</text>

  <!-- Decorative bottom line -->
  <line x1="400" y1="615" x2="800" y2="615" stroke="#30363d" stroke-width="1"/>

  <!-- Subtle branding -->
  <text x="600" y="650" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#484f58">awesome-human-activity-recognition</text>
</svg>