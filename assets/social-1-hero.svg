<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="675" stroke="white" stroke-width="1" transform="translate(60,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="white" stroke-width="1" transform="translate(120,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="white" stroke-width="1" transform="translate(180,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="white" stroke-width="1" transform="translate(240,0)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1" transform="translate(0,60)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1" transform="translate(0,120)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1" transform="translate(0,180)" />
  </g>

  <!-- Awesome badge -->
  <rect x="50" y="40" width="110" height="28" rx="4" fill="#fc60a8"/>
  <text x="105" y="59" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">awesome</text>

  <!-- Title -->
  <text x="50" y="120" font-family="Segoe UI, sans-serif" font-size="48" font-weight="800" fill="white">Awesome Human</text>
  <text x="50" y="175" font-family="Segoe UI, sans-serif" font-size="48" font-weight="800" fill="white">Activity Recognition</text>

  <!-- Subtitle -->
  <text x="50" y="215" font-family="Segoe UI, sans-serif" font-size="18" fill="#8b949e">The most comprehensive open-source HAR resource on GitHub</text>

  <!-- Big numbers row -->
  <g transform="translate(50, 260)">
    <!-- 53 Datasets -->
    <text x="0" y="50" font-family="Segoe UI, sans-serif" font-size="56" font-weight="800" fill="#06b6d4">53</text>
    <text x="0" y="75" font-family="Segoe UI, sans-serif" font-size="16" fill="#8b949e">Datasets</text>

    <!-- 23 Frameworks -->
    <text x="180" y="50" font-family="Segoe UI, sans-serif" font-size="56" font-weight="800" fill="#22c55e">23</text>
    <text x="180" y="75" font-family="Segoe UI, sans-serif" font-size="16" fill="#8b949e">Frameworks</text>

    <!-- 20+ Papers -->
    <text x="360" y="50" font-family="Segoe UI, sans-serif" font-size="56" font-weight="800" fill="#f97316">20+</text>
    <text x="360" y="75" font-family="Segoe UI, sans-serif" font-size="16" fill="#8b949e">Key Papers</text>

    <!-- 8 Languages -->
    <text x="540" y="50" font-family="Segoe UI, sans-serif" font-size="56" font-weight="800" fill="#a78bfa">8</text>
    <text x="540" y="75" font-family="Segoe UI, sans-serif" font-size="16" fill="#8b949e">Languages</text>
  </g>

  <!-- Right side: 5 modality cards -->
  <g transform="translate(750, 40)">
    <!-- Vision -->
    <rect x="0" y="0" width="400" height="52" rx="8" fill="#1c2333" stroke="#06b6d4" stroke-width="1.5" opacity="0.9"/>
    <circle cx="26" cy="26" r="10" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="26" cy="26" r="4" fill="#06b6d4"/>
    <text x="48" y="22" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#06b6d4">Vision (RGB / Depth)</text>
    <text x="48" y="40" font-family="Segoe UI, sans-serif" font-size="12" fill="#8b949e">14 datasets  |  Kinetics-700 · UCF-101 · AVA</text>
    <text x="370" y="30" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#06b6d4" text-anchor="end">14</text>

    <!-- Skeleton -->
    <rect x="0" y="62" width="400" height="52" rx="8" fill="#1c2333" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>
    <g transform="translate(26,88)">
      <circle cx="0" cy="-10" r="4" fill="#22c55e"/>
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#22c55e" stroke-width="2"/>
      <line x1="-8" y1="-2" x2="8" y2="-2" stroke="#22c55e" stroke-width="2"/>
      <line x1="-5" y1="10" x2="0" y2="6" stroke="#22c55e" stroke-width="2"/>
      <line x1="5" y1="10" x2="0" y2="6" stroke="#22c55e" stroke-width="2"/>
    </g>
    <text x="48" y="84" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#22c55e">Skeleton &amp; MoCap</text>
    <text x="48" y="102" font-family="Segoe UI, sans-serif" font-size="12" fill="#8b949e">7 datasets  |  NTU RGB+D · AMASS · Human3.6M</text>
    <text x="370" y="92" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#22c55e" text-anchor="end">7</text>

    <!-- Wearable -->
    <rect x="0" y="124" width="400" height="52" rx="8" fill="#1c2333" stroke="#f97316" stroke-width="1.5" opacity="0.9"/>
    <rect x="16" y="140" width="20" height="24" rx="5" fill="none" stroke="#f97316" stroke-width="2"/>
    <path d="M22 148 L30 148 M22 152 L28 152 M22 156 L30 156" stroke="#f97316" stroke-width="1.5" fill="none"/>
    <text x="48" y="146" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#f97316">Wearable Sensors</text>
    <text x="48" y="164" font-family="Segoe UI, sans-serif" font-size="12" fill="#8b949e">13 datasets  |  UCI-HAR · CAPTURE-24 (3883 hrs)</text>
    <text x="370" y="154" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#f97316" text-anchor="end">13</text>

    <!-- Multimodal -->
    <rect x="0" y="186" width="400" height="52" rx="8" fill="#1c2333" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
    <circle cx="20" cy="212" r="8" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
    <circle cx="32" cy="212" r="8" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
    <circle cx="26" cy="204" r="8" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
    <text x="48" y="208" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Multimodal / Egocentric</text>
    <text x="48" y="226" font-family="Segoe UI, sans-serif" font-size="12" fill="#8b949e">7 datasets  |  Ego4D (3.3k hrs) · EPIC-Kitchens</text>
    <text x="370" y="216" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#a78bfa" text-anchor="end">7</text>

    <!-- Emerging -->
    <rect x="0" y="248" width="400" height="52" rx="8" fill="#1c2333" stroke="#ec4899" stroke-width="1.5" opacity="0.9"/>
    <g transform="translate(26,274)">
      <path d="M0,-10 L2,-3 L10,-3 L3,2 L5,10 L0,5 L-5,10 L-3,2 L-10,-3 L-2,-3 Z" fill="#ec4899" opacity="0.8"/>
    </g>
    <text x="48" y="270" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#ec4899">Emerging &amp; Frontier</text>
    <text x="48" y="288" font-family="Segoe UI, sans-serif" font-size="12" fill="#8b949e">12 datasets  |  WiMANS (WiFi!) · Motion-X++</text>
    <text x="370" y="278" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#ec4899" text-anchor="end">12</text>
  </g>

  <!-- Bottom features row -->
  <g transform="translate(50, 420)">
    <!-- Feature pills -->
    <rect x="0" y="0" width="200" height="70" rx="10" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
    <text x="100" y="30" font-family="Segoe UI, sans-serif" font-size="22" fill="white" text-anchor="middle">&#x1F50D;</text>
    <text x="100" y="55" font-family="Segoe UI, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Searchable Website</text>

    <rect x="220" y="0" width="200" height="70" rx="10" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
    <text x="320" y="30" font-family="Segoe UI, sans-serif" font-size="22" fill="white" text-anchor="middle">&#x1F504;</text>
    <text x="320" y="55" font-family="Segoe UI, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Weekly SOTA Updates</text>

    <rect x="440" y="0" width="200" height="70" rx="10" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
    <text x="540" y="30" font-family="Segoe UI, sans-serif" font-size="22" fill="white" text-anchor="middle">&#x1F30D;</text>
    <text x="540" y="55" font-family="Segoe UI, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">8 Languages</text>

    <rect x="660" y="0" width="200" height="70" rx="10" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
    <text x="760" y="30" font-family="Segoe UI, sans-serif" font-size="22" fill="white" text-anchor="middle">&#x1F517;</text>
    <text x="760" y="55" font-family="Segoe UI, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Auto Link Validation</text>

    <rect x="880" y="0" width="240" height="70" rx="10" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
    <text x="1000" y="30" font-family="Segoe UI, sans-serif" font-size="22" fill="white" text-anchor="middle">&#x1F4CA;</text>
    <text x="1000" y="55" font-family="Segoe UI, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Benchmarks &amp; Baselines</text>
  </g>

  <!-- Bottom: pipeline diagram -->
  <g transform="translate(50, 530)">
    <text x="0" y="15" font-family="Segoe UI, sans-serif" font-size="11" fill="#484f58" font-weight="600" letter-spacing="2">AUTO-UPDATE PIPELINE</text>

    <!-- Pipeline flow -->
    <rect x="0" y="30" width="140" height="36" rx="6" fill="#1c2333" stroke="#06b6d4" stroke-width="1"/>
    <text x="70" y="53" font-family="Segoe UI, sans-serif" font-size="12" fill="#06b6d4" text-anchor="middle">Papers with Code</text>

    <path d="M145 48 L175 48" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>
    <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#30363d"/></marker></defs>

    <rect x="180" y="30" width="140" height="36" rx="6" fill="#1c2333" stroke="#22c55e" stroke-width="1"/>
    <text x="250" y="53" font-family="Segoe UI, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">SOTA Updater</text>

    <path d="M325 48 L355 48" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="360" y="30" width="140" height="36" rx="6" fill="#1c2333" stroke="#f97316" stroke-width="1"/>
    <text x="430" y="53" font-family="Segoe UI, sans-serif" font-size="12" fill="#f97316" text-anchor="middle">sota-snapshot.json</text>

    <path d="M505 48 L535 48" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="540" y="30" width="140" height="36" rx="6" fill="#1c2333" stroke="#a78bfa" stroke-width="1"/>
    <text x="610" y="53" font-family="Segoe UI, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">GitHub Actions</text>

    <path d="M685 48 L715 48" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="720" y="30" width="160" height="36" rx="6" fill="#1c2333" stroke="#ec4899" stroke-width="1"/>
    <text x="800" y="53" font-family="Segoe UI, sans-serif" font-size="12" fill="#ec4899" text-anchor="middle">Auto-commit weekly</text>

    <!-- Loop arrow -->
    <path d="M800 70 L800 85 L70 85 L70 70" stroke="#30363d" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
    <text x="435" y="98" font-family="Segoe UI, sans-serif" font-size="10" fill="#484f58" text-anchor="middle">&#x1F504; repeats every Wednesday</text>
  </g>

  <!-- GitHub URL bottom right -->
  <text x="1150" y="650" font-family="Segoe UI Mono, monospace" font-size="13" fill="#484f58" text-anchor="end">github.com/Leooo-Huang/awesome-human-activity-recognition</text>
</svg>